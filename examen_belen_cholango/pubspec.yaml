name: examen_belen_cholango
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Base de datos SQL
  sqflite: ^2.3.2
  path: ^1.9.0

  # Base de datos NoSQL
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gestor de estado
  provider: ^6.1.2

  # Otras dependencias del proyecto original
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generadores de código necesarios para los modelos de Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
